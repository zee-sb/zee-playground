<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigator Agent Network — Studio Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #F3F4F6; padding-top: 48px; }
    /* height fix for full-screen React app below the proto-bar */
    #root > div { height: calc(100vh - 48px) !important; }

    /* ── Prototype chrome bar ── */
    .proto-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #1C1C1E; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 48px; font-size: 13px; }
    .proto-bar-left { display: flex; align-items: center; gap: 12px; }
    .proto-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; transition: color 0.15s; }
    .proto-back:hover { color: #fff; }
    .proto-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
    .proto-title { font-weight: 500; }
    .proto-tags { display: flex; gap: 6px; }
    .proto-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
    .tag-navigator { background: #1D4ED8; color: #BFDBFE; }
    .tag-ready { background: #14532D; color: #86EFAC; }
    .tag-wip { background: #422006; color: #FCD34D; }
    .nav-pill { background: #111827; color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 500; }
    .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13.5px; color: #374151; transition: background 0.1s; }
    .sidebar-item:hover { background: #F9FAFB; }
    .sidebar-item.active { background: #EFF6FF; color: #1D4ED8; font-weight: 500; }
    .sidebar-section { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 12px 4px; }
    .tab { padding: 10px 0; font-size: 14px; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent; font-weight: 400; transition: color 0.15s; }
    .tab:hover { color: #374151; }
    .tab.active { color: #111827; border-bottom-color: #3B82F6; font-weight: 500; }
    .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; }
    .btn-primary { background: #3B82F6; color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: #2563EB; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #D1D5DB; border-radius: 6px; padding: 7px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; }
    .btn-secondary:hover { background: #F9FAFB; }
    .btn-ghost { background: transparent; color: #374151; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13.5px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-ghost:hover { background: #F3F4F6; }
    .badge { display: inline-flex; align-items: center; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .badge-beta { background: #F3F4F6; color: #6B7280; }
    .badge-external { background: #EFF6FF; color: #1D4ED8; }
    .badge-internal { background: #F0FDF4; color: #15803D; }
    .badge-global { background: #FEF9C3; color: #854D0E; }
    .badge-active { background: #F0FDF4; color: #15803D; }
    .badge-degraded { background: #FEF3C7; color: #92400E; }
    .badge-inactive { background: #F3F4F6; color: #6B7280; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #22C55E; }
    .dot-amber { background: #F59E0B; }
    .dot-red { background: #EF4444; }
    .input { width: 100%; border: 1px solid #D1D5DB; border-radius: 6px; padding: 8px 12px; font-size: 14px; color: #111827; outline: none; }
    .input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .textarea { width: 100%; border: 1px solid #D1D5DB; border-radius: 6px; padding: 10px 12px; font-size: 14px; color: #111827; outline: none; resize: vertical; min-height: 90px; }
    .textarea:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .select { width: 100%; border: 1px solid #D1D5DB; border-radius: 6px; padding: 8px 12px; font-size: 14px; color: #111827; outline: none; background: #fff; }
    .radio-option { border: 1px solid #E5E7EB; border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .radio-option.selected { border-color: #3B82F6; background: #EFF6FF; }
    .code-block { background: #1E293B; color: #E2E8F0; border-radius: 8px; padding: 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; }
    .code-key { color: #93C5FD; }
    .code-val { color: #86EFAC; }
    .code-str { color: #FCA5A5; }
    .alert-warning { background: #FFFBEB; border: 1px solid #FCD34D; border-radius: 8px; padding: 14px 16px; }
    .alert-success { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: 8px; padding: 14px 16px; }
    .progress-step { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
    .progress-step.done { background: #3B82F6; color: #fff; }
    .progress-step.active { background: #3B82F6; color: #fff; }
    .progress-step.pending { background: #E5E7EB; color: #9CA3AF; }
    .progress-line { height: 2px; flex: 1; }
    .progress-line.done { background: #3B82F6; }
    .progress-line.pending { background: #E5E7EB; }
    .list-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #F3F4F6; cursor: pointer; transition: background 0.1s; }
    .list-row:hover { background: #F9FAFB; }
    .list-row:last-child { border-bottom: none; }
    .agent-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .screen-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1E293B; border-radius: 12px; padding: 10px 20px; display: flex; gap: 8px; align-items: center; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .screen-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; color: #94A3B8; background: transparent; font-weight: 500; white-space: nowrap; transition: all 0.15s; }
    .screen-btn:hover { color: #fff; background: #334155; }
    .screen-btn.active { background: #3B82F6; color: #fff; }
  </style>
</head>
<body>

<nav class="proto-bar">
  <div class="proto-bar-left">
    <a class="proto-back" href="../index.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Gallery
    </a>
    <div class="proto-divider"></div>
    <span class="proto-title">Navigator — Agent Network Studio</span>
  </div>
  <div class="proto-tags">
    <span class="proto-tag tag-navigator">Navigator</span>
    <span class="proto-tag tag-ready">Ready</span>
  </div>
</nav>

<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Icons (inline SVG) ──────────────────────────────────────────────────────
const Icon = ({ name, size = 16, color = 'currentColor', className = '' }) => {
  const paths = {
    chevronDown: <polyline points="6 9 12 15 18 9"/>,
    chevronRight: <polyline points="9 18 15 12 9 6"/>,
    arrowLeft: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    barChart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
    shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
    link: <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>,
    check: <polyline points="20 6 9 12 4 9"/>,
    checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
    alertTriangle: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    play: <polygon points="5 3 19 12 5 21 5 3"/>,
    externalLink: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>,
    refresh: <><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
    globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
    cpu: <><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></>,
    key: <><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></>,
    activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
    info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
    copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
    trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
    navigator: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
    puzzle: <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01"/>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {paths[name]}
    </svg>
  );
};

// ── Shared Shell ──────────────────────────────────────────────────────────────
const Shell = ({ children, activeSidebarItem = 'Navigator', activeTab = null, onTabChange, tabs = [], pageTitle, pageSubtitle, actions, backLabel, onBack, warningBanner }) => (
  <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: '#F3F4F6' }}>
    {/* Top Nav */}
    <div style={{ background: '#fff', borderBottom: '1px solid #E5E7EB', height: 52, display: 'flex', alignItems: 'center', padding: '0 20px', gap: 24, flexShrink: 0, zIndex: 10 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 8 }}>
        <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#1E293B', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="navigator" size={14} color="#fff" />
        </div>
        <span style={{ fontWeight: 600, fontSize: 14, color: '#111827' }}>Staffbase Studio</span>
      </div>
      {['Dashboard','Planning','Content','Email','SMS','Screens','External Content','Files','Analytics'].map(n => (
        <span key={n} style={{ fontSize: 13.5, cursor: 'pointer' }}>
          {n === 'Content' ? <span className="nav-pill">{n}</span> : <span style={{ color: '#6B7280', fontWeight: 400 }}>{n}</span>}
        </span>
      ))}
      <div style={{ marginLeft: 'auto', display: 'flex', gap: 12, alignItems: 'center' }}>
        <Icon name="users" size={18} color="#6B7280" />
        <Icon name="settings" size={18} color="#6B7280" />
        <div style={{ width: 30, height: 30, borderRadius: '50%', background: '#6366F1', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 600 }}>ZA</div>
      </div>
    </div>

    <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
      {/* Sidebar */}
      <div style={{ width: 192, background: '#fff', borderRight: '1px solid #E5E7EB', overflow: 'auto', flexShrink: 0, padding: '8px 8px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px 14px', cursor: 'pointer' }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: '#374151' }}>All Employees</div>
          <Icon name="chevronDown" size={14} color="#9CA3AF" />
        </div>
        <div className="sidebar-section">Content</div>
        {['News','Pages','Embedded Pages','Surveys','Links','Journeys','Directory','Forms','Event Registration'].map(n => (
          <div key={n} className="sidebar-item" style={{ fontSize: 13 }}>{n}</div>
        ))}
        <div className="sidebar-item" style={{ color: '#3B82F6', fontSize: 13, marginTop: 4 }}>
          <Icon name="plus" size={13} color="#3B82F6" /> Add Plugin
        </div>
        <div className="sidebar-section" style={{ marginTop: 8 }}>Space</div>
        <div className="sidebar-item" style={{ fontSize: 13, justifyContent: 'space-between' }}>
          <span>Groups</span><span className="badge badge-beta">Beta</span>
        </div>
        <div className="sidebar-section" style={{ marginTop: 8 }}>System</div>
        {['Spaces','Menu','Launchpad'].map(n => (
          <div key={n} className="sidebar-item" style={{ fontSize: 13 }}>{n}</div>
        ))}
        <div className={`sidebar-item ${activeSidebarItem === 'Navigator' ? 'active' : ''}`} style={{ fontSize: 13 }}>Navigator</div>
        {['Comments','Trash'].map(n => (
          <div key={n} className="sidebar-item" style={{ fontSize: 13 }}>{n}</div>
        ))}
      </div>

      {/* Main */}
      <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
        {warningBanner && (
          <div className="alert-warning" style={{ margin: '16px 24px 0', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
            <Icon name="alertTriangle" size={18} color="#D97706" style={{ flexShrink: 0, marginTop: 1 }} />
            <div>
              <div style={{ fontWeight: 600, fontSize: 13.5, color: '#92400E' }}>{warningBanner.title}</div>
              <div style={{ fontSize: 13, color: '#78350F', marginTop: 2 }}>{warningBanner.message}</div>
            </div>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
              <button className="btn-secondary" style={{ fontSize: 12, padding: '5px 10px' }}>{warningBanner.action}</button>
              <button className="btn-secondary" style={{ fontSize: 12, padding: '5px 10px' }}>Dismiss</button>
            </div>
          </div>
        )}

        {/* Page header */}
        <div style={{ padding: '20px 24px 0', background: '#F3F4F6' }}>
          {onBack && (
            <button className="btn-ghost" style={{ padding: '4px 0', marginBottom: 10, color: '#6B7280', fontSize: 13 }} onClick={onBack}>
              <Icon name="arrowLeft" size={14} /> {backLabel || 'Back'}
            </button>
          )}
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
            <div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: '#111827' }}>{pageTitle}</h1>
              {pageSubtitle && <p style={{ margin: '3px 0 0', fontSize: 13.5, color: '#6B7280' }}>{pageSubtitle}</p>}
            </div>
            {actions && <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>{actions}</div>}
          </div>
          {tabs.length > 0 && (
            <div style={{ display: 'flex', gap: 24, marginTop: 16, borderBottom: '1px solid #E5E7EB' }}>
              {tabs.map(t => (
                <div key={t} className={`tab ${activeTab === t ? 'active' : ''}`} onClick={() => onTabChange && onTabChange(t)}>{t}</div>
              ))}
            </div>
          )}
        </div>

        <div style={{ padding: '20px 24px', flex: 1 }}>{children}</div>
      </div>
    </div>
  </div>
);

// ── Screen 1: Navigator Agents Tab ───────────────────────────────────────────
const AgentsScreen = ({ onConnect, onOpenAgent, onOpenExternal }) => {
  const internalAgents = [
    { name: 'My Kitchen Guide', type: 'internal', icon: '🍽️', groups: 'Kitchen Staff', status: 'active' },
    { name: 'Employee Handbook', type: 'internal', icon: '📋', groups: 'All Employees', status: 'active' },
  ];
  const externalAgents = [
    { name: 'IT Helpdesk (Copilot Studio)', type: 'external', icon: '🤖', provider: 'copilot', attachment: 'Global Agent', groups: 'All Employees', status: 'active', latency: '1.2s', completion: '94%' },
    { name: 'HR Bot (Workday)', type: 'external', icon: '👥', provider: 'custom', attachment: 'Global Agent', groups: 'All Employees', status: 'degraded', latency: '4.1s', completion: '71%' },
  ];
  return (
    <Shell
      pageTitle="Navigator"
      pageSubtitle="Configure Navigator settings and preferences"
      tabs={['Identity','Knowledge','Agents','Settings']}
      activeTab="Agents"
      actions={<>
        <button className="btn-ghost"><Icon name="barChart" size={15} /> Analytics</button>
        <button className="btn-ghost"><Icon name="puzzle" size={15} /> Branding</button>
        <button className="btn-primary">Save</button>
      </>}
      warningBanner={{
        title: 'HR Bot (Workday) is degraded',
        message: '3 health checks failed in the last 5 minutes. Navigator is routing matching queries to the Global Agent fallback.',
        action: 'View health log'
      }}
    >
      {/* Internal Assistants */}
      <div className="card" style={{ marginBottom: 16 }}>
        <div style={{ padding: '18px 20px', borderBottom: '1px solid #F3F4F6' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontWeight: 600, fontSize: 15, color: '#111827' }}>Assistants</span>
                <span style={{ background: '#EFF6FF', color: '#1D4ED8', fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 20 }}>2/10 Added</span>
              </div>
              <p style={{ margin: '4px 0 0', fontSize: 13, color: '#6B7280' }}>Internal knowledge assistants scoped to specific content and groups.</p>
            </div>
            <button className="btn-secondary" style={{ fontSize: 13 }} onClick={onConnect}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="plus" size={13} /> Create Assistant</span>
            </button>
          </div>
        </div>
        {internalAgents.map((a, i) => (
          <div key={i} className="list-row" onClick={() => onOpenAgent(a)}>

                    <div style={{ fontWeight: 600, fontSize: 13.5, color: '#111827', fontFamily: 'monospace' }}>{intent.id}</div>
                    <div style={{ fontSize: 13, color: '#6B7280', marginTop: 3 }}>{intent.desc}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 12, color: '#6B7280' }}>Threshold:</span>
                    <span style={{ background: '#F0FDF4', color: '#15803D', fontSize: 12, fontWeight: 600, padding: '2px 8px', borderRadius: 4 }}>{intent.threshold}</span>
                  </div>
                </div>
                <div style={{ marginTop: 10, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {intent.examples.map(e => (
                    <span key={e} style={{ background: '#F3F4F6', color: '#374151', fontSize: 11.5, padding: '3px 9px', borderRadius: 4 }}>"{e}"</span>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div className="card" style={{ padding: 20 }}>
            <h4 style={{ margin: '0 0 12px', fontSize: 14, fontWeight: 600, color: '#111827' }}>Topics</h4>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {['IT support','Access management','Hardware','Software licensing'].map(t => (
                <span key={t} style={{ background: '#EFF6FF', color: '#1D4ED8', fontSize: 12, fontWeight: 500, padding: '4px 12px', borderRadius: 20 }}>{t}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </Shell>
  );
};

                { icon: 'checkCircle', color: '#16A34A', text: 'User groups match', detail: 'Maria Rossi → All Employees ✓' },
                { icon: 'checkCircle', color: '#16A34A', text: 'Agent status: Active', detail: 'Health check passed 2 min ago' },

              ))}

            <div className="card" style={{ padding: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <h4 style={{ margin: 0, fontSize: 14, fontWeight: 600, color: '#111827' }}>Request sent</h4>
                <span style={{ fontSize: 12, color: '#9CA3AF' }}>Latency: <strong style={{ color: '#111827' }}>1.1s</strong></span>

              <div className="code-block">

                <div style={{ paddingLeft: 16 }}><span className="code-key">"user_context"</span>: &#123; <span className="code-key">"role"</span>: <span className="code-str">"manager"</span>, <span className="code-key">"dept"</span>: <span className="code-str">"HR"</span> &#125;</div>

// ── Screen 7: Success / Connected ────────────────────────────────────────────

// ── App ───────────────────────────────────────────────────────────────────────
const SCREENS = ['Agents List','Wizard: Step 1','Wizard: Step 2','Wizard: Step 3','Agent Detail','Test Mode','Success'];

function App() {
  const [screen, setScreen] = useState(0);
  const [selectedAgent, setSelectedAgent] = useState(null);

  const renderScreen = () => {
    switch(screen) {
      case 0: return <AgentsScreen onConnect={() => setScreen(1)} onOpenAgent={a => { setSelectedAgent(a); setScreen(4); }} onOpenExternal={a => { setSelectedAgent(a); setScreen(4); }} />;
      case 1: return <WizardStep1 onNext={() => setScreen(2)} onBack={() => setScreen(0)} />;
      case 2: return <WizardStep2 onNext={() => setScreen(3)} onBack={() => setScreen(1)} />;
      case 3: return <WizardStep3 onDone={() => setScreen(6)} onBack={() => setScreen(2)} />;
      case 4: return <AgentDetailScreen agent={selectedAgent} onBack={() => setScreen(0)} onTestMode={() => setScreen(5)} />;
      case 5: return <TestModeScreen onBack={() => setScreen(4)} />;
      case 6: return <SuccessScreen onDone={() => setScreen(0)} />;
      default: return null;
    }
  };

  return (
    <div>
      {renderScreen()}

      {/* Screen navigator */}
      <div className="screen-nav">
        <span style={{ fontSize: 11, color: '#64748B', marginRight: 4, fontWeight: 600 }}>SCREENS</span>
        {SCREENS.map((s, i) => (
          <button key={i} className={`screen-btn ${screen === i ? 'active' : ''}`} onClick={() => setScreen(i)}>{s}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
